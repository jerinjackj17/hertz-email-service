<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- TOP RED STRIPE -->
          <tr>
            <td style="background:linear-gradient(90deg,#e8000d 0%,#ff1a1a 50%,#c0000a 100%);height:6px;border-radius:4px 4px 0 0;"></td>
          </tr>

          <!-- HEADER -->
          <tr>
            <td style="background-color:#111111;padding:36px 40px 28px;text-align:center;border-left:1px solid #1f1f1f;border-right:1px solid #1f1f1f;">
              <!-- Hertz wordmark -->
              <div style="font-size:11px;letter-spacing:4px;color:#e8000d;font-weight:700;text-transform:uppercase;margin-bottom:10px;">HERTZ INC. WISHES YOU</div>
              <div style="font-size:34px;font-weight:900;color:#ffffff;letter-spacing:-1px;line-height:1.1;">HAPPY BIRTHDAY</div>
              <div style="width:48px;height:3px;background:#e8000d;margin:14px auto 0;border-radius:2px;"></div>
            </td>
          </tr>

          <!-- MAIN BODY -->
          <tr>
            <td style="background-color:#161616;padding:36px 40px;border-left:1px solid #1f1f1f;border-right:1px solid #1f1f1f;">

              <!-- Greeting -->
              <p style="margin:0 0 16px;font-size:22px;font-weight:700;color:#ffffff;">
                Happy Birthday <span style="color:#e8000d;">{{customerName}} </span>!
              </p>

              <!-- Message -->
              <p style="margin:0 0 32px;font-size:15px;color:#aaaaaa;line-height:1.7;">
                We are happy to have you as a loyal customer with <strong style="color:#ffffff;">Hertz Inc.</strong>
              </p>

              <!-- Best Wishes -->
              <p style="margin:0;font-size:13px;color:#555555;letter-spacing:2px;text-transform:uppercase;">Best Wishes,</p>
              <p style="margin:4px 0 0;font-size:14px;font-weight:700;color:#e8000d;letter-spacing:1px;">HERTZ INC.</p>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background-color:#0f0f0f;padding:24px 40px;border:1px solid #1f1f1f;border-top:none;border-radius:0 0 4px 4px;text-align:center;">
              <div style="font-size:11px;color:#333333;">This email was sent to <span style="color:#555555;">{{email}}</span></div>
            </td>
          </tr>

          <!-- BOTTOM RED STRIPE -->
          <tr>
            <td style="background:linear-gradient(90deg,#c0000a 0%,#e8000d 50%,#c0000a 100%);height:4px;border-radius:0 0 4px 4px;"></td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
